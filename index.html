<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BOSS BET 🛸 | VERT RAIKA</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🚀🔥 VERT RAIKA</h1>
            <p class="subtitle">PRÉDICTION SPÉCIALE ×5+</p>
        </div>

        <!-- Input Forms -->
        <div class="input-group">
            <label for="heureInput">⏰ HEURE DE DÉPART</label>
            <input type="text" id="heureInput" name="heureInput" placeholder="HH:MM" maxlength="5" value="01:53">
        </div>

        <div class="input-group">
            <label for="multiplicateurInput">💎 MULTIPLICATEUR ×5+</label>
            <input type="number" id="multiplicateurInput" name="multiplicateurInput" step="0.01" min="5" placeholder="x5.00+" value="5.62">
            <p class="hint">Entrez le dernier multiplicateur supérieur à ×5</p>
        </div>

        <!-- Predict Button -->
        <button class="btn-predict" id="predictBtn">
            <span>✅🔥 PRÉDICTION VERT RAIKA</span>
        </button>

        <!-- Loading -->
        <div id="loading" class="loading-container hidden">
            <div class="spinner"></div>
            <div class="loading-text">ANALYSE EN COURS...</div>
        </div>

        <!-- Results Container -->
        <div id="results" class="results hidden">
            <h3 class="results-title">🚀 3 PRÉDICTIONS VERT RAIKA</h3>
            <div id="predictionsList"></div>
        </div>

        <!-- Footer -->
        <div class="footer">
            BOSS BET 🛸 AVIATOR PREDICTOR
        </div>
    </div>

    <!-- JavaScript at the end of body for better performance -->
    <script src="script.js"></script>
</body>
</html>
